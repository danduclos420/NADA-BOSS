name: Build NADA BOSS VST3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Find VST3 file
        run: |
          Get-ChildItem -Recurse -Filter *.vst3 build
        shell: pwsh

      - name: Upload VST3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: NADA-BOSS-VST3-Windows
          path: build/**/*.vst3
          if-no-files-found: warn

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: NADA BOSS v1.0.${{ github.run_number }}
          files: build/**/*.vst3
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
